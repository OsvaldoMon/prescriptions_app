services:
  postgres:
    image: postgres:16-alpine
    container_name: prescriptions-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prescriptions}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prescriptions}
      POSTGRES_DB: ${POSTGRES_DB:-prescriptions}
    volumes:
      - prescriptions_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-prescriptions} -d ${POSTGRES_DB:-prescriptions}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prescriptions_postgres_data:
